augmentations: {
  add_noise: False,
  add_reverb: False,
  drop_freq: False,
  drop_chunk: False,

}
dataset: null
vox1_wav_root: "/ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/wav"
