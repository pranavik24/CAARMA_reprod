model: MFA-CONFORMER
features: FBank_New
augmentations:
  add_noise: false
  add_reverb: false
  drop_freq: false
  drop_chunk: false
dataset: null
vox1_wav_root: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/wav
vox1_split_dir: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data
train_split_csv: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data/vox1_train.csv
