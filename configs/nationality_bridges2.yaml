# Nationality mixup config for Bridges-2 (`mixup_nationality.py`).
model: MFA-CONFORMER
features: FBank_New
augmentations:
  add_noise: false
  add_reverb: false
  drop_freq: false
  drop_chunk: false
dataset: null
vox1_wav_root: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/wav
vox1_split_dir: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data
train_split_csv: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data/vox1_train.csv
val_split_csv: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data/vox1_val.csv
test_split_csv: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/data/vox1_test.csv
active_split: train
USE_WANDB: true
wandb_project: caarma-nationality
criterion: AMSoftmaxGAN
init_lr: 0.001
epochs: 20
weight_decay: 0.0000001
trial_path: data/vox1_test.txt
root: /ocean/projects/cis220031p/shared/raw/data/VoxCeleb1/wav
generate_validation_trials: true
validation_split: val
validation_trial_protocol: generated_cross_session
validation_max_speakers: 300
warmup_step: 2000
batch_size: 50
num_workers: 4
val_num_workers: 4
train_drop_last: true
second: 3
do_augmentation: false
num_spk: 1211
mixup: true
nationality_mixup: true
discriminator: simple
discriminator_hidden_dim: 256
discriminator_dropout: 0.1
validate_during_train: true
vox1_meta_path: vox1_meta.csv
embedding_dim: 192
checkpoint_path: null
save_dir: ${PROJECT}/caarma-output/nationality
title: caarma_nationality
score_output_prefix: caarma_nationality
devices: 1
